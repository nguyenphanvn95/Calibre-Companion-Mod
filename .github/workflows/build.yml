name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --split-per-abi --dart-define=GDRIVE_PUBLIC_API_KEY=${{ secrets.GDRIVE_PUBLIC_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-debug
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk